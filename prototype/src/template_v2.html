<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" href="data:,">
<title>경복궁 타임워크</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family:"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif; }
  #gl { position:fixed; inset:0; width:100%; height:100%; display:block; cursor:grab; touch-action:none; }
  #fade { position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; transition:opacity .26s ease; z-index:5; }

  .hud { position:fixed; z-index:10; color:#fff; }
  #title { top:18px; left:20px; text-shadow:0 1px 8px rgba(0,0,0,.55); }
  #title h1 { font-size:17px; font-weight:700; }
  #title .sub { font-size:12px; opacity:.75; margin-top:3px; }
  #eraLabel { top:16px; right:20px; text-align:right; text-shadow:0 1px 8px rgba(0,0,0,.55); }
  #eraLabel .year { font-size:32px; font-weight:800; font-variant-numeric:tabular-nums; }
  #eraLabel .name { font-size:13px; opacity:.9; margin-top:2px; }
  #badge { top:96px; right:20px; font-size:10.5px; color:rgba(255,255,255,.6);
    text-align:right; max-width:46vw; text-shadow:0 1px 4px rgba(0,0,0,.5); }
  #badge.est { color:#f0c274; }

  #timeline { bottom:18px; left:50%; transform:translateX(-50%); width:min(760px,94vw);
    display:flex; gap:6px; justify-content:center; overflow-x:auto; padding:4px; }
  .eraChip { flex:0 0 auto; border:1px solid rgba(255,255,255,.3); background:rgba(18,18,24,.6);
    color:#fff; border-radius:12px; padding:7px 12px; cursor:pointer; text-align:center;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:all .18s; min-width:86px; }
  .eraChip .y { display:block; font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; }
  .eraChip .n { display:block; font-size:10.5px; opacity:.8; margin-top:1px; }
  .eraChip.active { background:rgba(255,255,255,.94); color:#141414; border-color:transparent;
    box-shadow:0 3px 14px rgba(0,0,0,.45); }
  .eraChip.active .n { opacity:.7; }

  #map { position:fixed; z-index:10; left:20px; bottom:78px; width:150px; height:auto;
    border:1px solid rgba(255,255,255,.25); border-radius:10px; opacity:.92; cursor:crosshair;
    background:#171719; display:none; }
  #maplabel { left:24px; bottom:56px; font-size:10px; color:rgba(255,255,255,.55); display:none; }

  #infoBtn, #shareBtn, #mapBtn { width:40px; height:40px; border-radius:50%;
    border:1px solid rgba(255,255,255,.4); background:rgba(20,20,26,.55); color:#fff;
    font-size:17px; font-weight:700; cursor:pointer; backdrop-filter:blur(8px); z-index:11; position:fixed; right:20px; }
  #infoBtn { bottom:100px; }
  #shareBtn { bottom:148px; }
  #mapBtn { bottom:196px; }
  #scanNote { position:fixed; z-index:12; left:50%; transform:translateX(-50%); bottom:88px;
    font-size:11px; color:#cfe6cf; background:rgba(16,20,16,.7); border-radius:8px; padding:5px 12px;
    transition:opacity 1s; pointer-events:none; }
  #scanNote:empty { display:none; }
  #toast { position:fixed; z-index:30; left:50%; top:18%; transform:translateX(-50%);
    font-size:13px; color:#fff; background:rgba(20,20,26,.85); border-radius:10px; padding:9px 16px;
    opacity:0; transition:opacity .3s; pointer-events:none; }
  #card { position:fixed; z-index:20; right:20px; bottom:144px; width:min(340px,88vw);
    max-height:min(60vh,540px); overflow-y:auto; background:rgba(16,16,20,.93); color:#eee;
    border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:16px;
    backdrop-filter:blur(12px); transform:translateY(12px); opacity:0; pointer-events:none; transition:all .22s ease; }
  #card.open { transform:none; opacity:1; pointer-events:auto; }
  #card h2 { font-size:15px; margin-bottom:8px; }
  #card img { width:100%; border-radius:8px; margin:4px 0 6px; }
  #card .cap { font-size:11px; color:#9a9a9a; margin-bottom:10px; line-height:1.5; }
  #card p { font-size:13px; line-height:1.65; margin-bottom:10px; }
  #card blockquote { font-size:13px; line-height:1.6; border-left:3px solid #c98d4f;
    padding:2px 0 2px 10px; margin-bottom:10px; color:#f3e3cd; }
  #card .src { font-size:11px; } #card .src a { color:#8fb8e8; }

  #hint { top:54%; left:50%; transform:translate(-50%,-50%); font-size:13px; color:#fff;
    background:rgba(16,16,20,.6); padding:10px 18px; border-radius:12px; line-height:1.8;
    text-align:center; backdrop-filter:blur(6px); transition:opacity .8s; pointer-events:none; }
  #credit { bottom:4px; right:10px; font-size:9.5px; color:rgba(255,255,255,.4);
    text-align:right; max-width:75vw; }
  #joy { display:none; position:fixed; z-index:15; width:100px; height:100px; border-radius:50%;
    border:2px solid rgba(255,255,255,.4); pointer-events:none; }
  #joyknob { position:absolute; left:30px; top:30px; width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,.5); }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="fade"></div>

<div class="hud" id="title">
  <h1>경복궁 타임워크</h1>
  <div class="sub">v0.3 — 여섯 시대를 걸어서 여행하는 경복궁 · 실측 스캔 탑재</div>
</div>
<div class="hud" id="eraLabel"><div class="year"></div><div class="name"></div></div>
<div class="hud" id="badge"></div>

<canvas id="map" width="170" height="300"></canvas>
<div class="hud" id="maplabel">미니맵 — 클릭하면 그 자리로 이동</div>

<div class="hud" id="timeline">
  <button class="eraChip" data-era="0"><span class="y">1395</span><span class="n">태조 창건</span></button>
  <button class="eraChip" data-era="1"><span class="y">15세기</span><span class="n">세종 시대</span></button>
  <button class="eraChip" data-era="2"><span class="y">1592~</span><span class="n">폐허 273년</span></button>
  <button class="eraChip active" data-era="3"><span class="y">1888</span><span class="n">고종 중건</span></button>
  <button class="eraChip" data-era="4"><span class="y">1929</span><span class="n">일제강점기</span></button>
  <button class="eraChip" data-era="5"><span class="y">2026</span><span class="n">현재</span></button>
</div>

<button id="infoBtn" title="이 시대의 기록">ⓘ</button>
<button id="shareBtn" title="이 장면 링크 복사">🔗</button>
<button id="mapBtn" title="미니맵 접기/펼치기">🗺</button>
<div id="card"></div>
<div id="scanNote"></div>
<div id="toast"></div>
<div class="hud" id="hint">🖱 드래그 — 둘러보기 · W A S D — 걷기 (Shift 달리기)<br>🔢 숫자 1~6 — 광화문·흥례문·영제교·근정문·근정전·경회루 바로가기<br>🖱 더블클릭 · 미니맵 클릭 — 그 지점으로 이동<br>⏳ 아래 시대 버튼 — 시간 여행 · 🔗 — 이 장면 공유</div>
<div class="hud" id="credit">자료: 국가유산청 · 국립중앙박물관 유리건판(공공누리 제1유형) · 국사편찬위원회 조선왕조실록 | 장면은 문헌·도면 기반 시안이며 고증 렌더가 아닙니다</div>
<div id="joy"><div id="joyknob"></div></div>

<script>%%THREE%%</script>
<script>%%LOADERS%%</script>
<script>%%PROPS%%</script>
<script>%%APP%%</script>
</body>
</html>
